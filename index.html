<!doctype html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Management System - Fixed Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap");
        :root { --primary: #4f46e5; --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --background: #f1f5f9; --surface: #ffffff; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: "Kantumruy Pro", sans-serif; }
        body { background-color: var(--background); color: #1e293b; margin: 0; padding: 20px; line-height: 1.5; }
        .header-panel { max-width: 900px; margin: 0 auto 30px; background: var(--surface); padding: 24px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); }
        .controls { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
        .input-group label { font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 8px; display: block; }
        select, input[type="number"] { height: 42px; padding: 0 12px; border: 2px solid var(--border); border-radius: 10px; background: #fff; font-size: 15px; font-weight: 600; outline: none; }
        .btn { height: 42px; padding: 0 20px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-success { background: var(--success); color: white; }
        .delete-staff-btn { background: #fee2e2; color: #ef4444; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; margin-left: 10px; }
        .period-selector { display: flex; background: #e2e8f0; padding: 5px; border-radius: 12px; margin-top: 20px; }
        .p-btn { flex: 1; padding: 12px; border: none; border-radius: 9px; background: transparent; cursor: pointer; font-weight: 700; color: #475569; }
        .p-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        .staff-card { max-width: 900px; margin: 0 auto 40px; background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .card-header { padding: 24px; background: #f8fafc; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .staff-name { font-size: 22px; font-weight: 800; color: var(--primary); padding: 5px 20px; background: white; border-radius: 50px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; background: #f1f5f9; font-size: 13px; font-weight: 700; color: #475569; border-bottom: 2px solid var(--border); }
        td { border-bottom: 1px solid var(--border); height: 40px; text-align: center; }
        .current-day-row { background-color: #fef9c3 !important; border-left: 5px solid var(--warning) !important; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-size: 16px; font-weight: 700; background: transparent; outline: none; }
        .row-day { background: #f8fafc; font-weight: 700; width: 60px; border-right: 1px solid var(--border); }
        .card-footer { padding: 30px; background: #ffffff; border-top: 2px dashed var(--border); display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 32px; font-weight: 900; color: var(--primary); }
        /* កូដកែសម្រួលសម្រាប់ការបោះពុម្ពលើ iPhone ឱ្យនៅ ១ សន្លឹកស្អាត */
      @media print {
        @page { 
          size: A4; 
          margin: 5mm; /* បន្ថែមគម្លាតបន្តិចដើម្បីកុំឱ្យដាច់ជ្រុង */
        }
        
        body { 
          background: white !important; 
          padding: 0 !important; 
          margin: 0 !important;
        }
        
        .no-print { 
          display: none !important; 
        }
        
        .staff-card { 
          box-shadow: none !important; 
          border: 1px solid var(--border) !important; 
          margin: 0 auto !important; 
          width: 100% !important; 
          /* កែសម្រួល zoom ឱ្យតូចជាងមុនបន្តិច ដើម្បីកុំឱ្យឆ្លងក្រដាស */
          zoom: 0.75; 
          -webkit-print-color-adjust: exact;
          page-break-inside: avoid; /* ការពារកុំឱ្យកាត់ពាក់កណ្តាលតារាង */
        }

        /* កំណត់ឱ្យតារាងមានកម្ពស់ល្មមជាមួយក្រដាស A4 */
        td { 
          height: 38px !important; 
        }
      }
    </style>
</head>
<body>
    <div class="header-panel no-print">
        <div class="controls">
            <div class="input-group">
                <label>កំណត់ត្រាខែ/ឆ្នាំ</label>
                <div style="display: flex; gap: 10px">
                    <select id="selectMonth" onchange="loadValues()"></select>
                    <input type="number" id="selectYear" style="width: 100px" onchange="loadValues()" />
                </div>
                <div id="statusLabel" class="save-status" style="font-size:12px; color: #64748b; margin-top:5px;">ស្ថានភាព: រួចរាល់</div>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap">
                <button class="btn btn-primary" onclick="addNewStaff()">➕ បន្ថែមជាង</button>
                <button class="btn btn-success" onclick="saveAll(true)">☁️ រក្សាទុកលើ Cloud</button>
                <button class="btn" style="background: #e2e8f0" onclick="window.print()">🖨️ បោះពុម្ព</button>
            </div>
        </div>
        <div class="period-selector">
            <button id="p1" class="p-btn active" onclick="changePeriod(1)">វគ្គ ១ (០១ - ១៥)</button>
            <button id="p2" class="p-btn" onclick="changePeriod(2)">វគ្គ ២ (១៦ - បញ្ចប់ខែ)</button>
        </div>
    </div>

    <div id="payrollContent"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZAqny0JqLDF0IsTDcgArh3yXew1FNoX8",
            authDomain: "payrollfullsystem.firebaseapp.com",
            projectId: "payrollfullsystem",
            storageBucket: "payrollfullsystem.firebasestorage.app",
            messagingSenderId: "408546677960",
            appId: "1:408546677960:web:88d7e03ad91644f11e81fd",
            databaseURL: "https://payrollfullsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let staffList = {};
        let currentPeriod = 1;
        let autoSaveTimer;

        window.onload = function () {
            const now = new Date();
            const months = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
            const monthSelect = document.getElementById("selectMonth");
            months.forEach((m, i) => {
                let opt = document.createElement("option"); opt.value = i + 1; opt.text = m; monthSelect.add(opt);
            });
            monthSelect.value = now.getMonth() + 1;
            document.getElementById("selectYear").value = now.getFullYear();
            if (now.getDate() > 15) changePeriod(2); else loadValues();
        };

        function changePeriod(p) {
            currentPeriod = p;
            document.getElementById("p1").classList.toggle("active", p === 1);
            document.getElementById("p2").classList.toggle("active", p === 2);
            loadValues();
        }

        function loadValues() {
            const m = document.getElementById("selectMonth").value;
            const y = document.getElementById("selectYear").value;
            const key = `payroll_id_system/${y}/${m}/P${currentPeriod}`;

            db.ref("global_staff_object").once("value", (snapshot) => {
                staffList = snapshot.val() || {};
                db.ref(key).once("value", (dataSnap) => {
                    renderTable(dataSnap.val() || {});
                });
            });
        }

        function renderTable(savedData) {
            const now = new Date();
            const curDay = now.getDate(), curMonth = now.getMonth() + 1, curYear = now.getFullYear();
            const selMonth = parseInt(document.getElementById("selectMonth").value);
            const selYear = parseInt(document.getElementById("selectYear").value);

            let start = currentPeriod === 1 ? 1 : 16;
            let end = currentPeriod === 1 ? 15 : new Date(selYear, selMonth, 0).getDate();

            let html = "";
            Object.keys(staffList).forEach((id) => {
                const p = staffList[id];
                const personalData = savedData[id] || {};
                html += `
                <div class="staff-card" data-id="${id}">
                    <div class="card-header">
                        <div style="display:flex; align-items:center;">
                            <div class="staff-name">👤 ${p.name}</div>
                            <button class="delete-staff-btn no-print" onclick="deleteStaff('${id}')">🗑️ លុប</button>
                        </div>
                        <div style="text-align:right">
                            <span style="font-size:11px; font-weight:bold; color:#64748b;">តម្លៃក្នុង១ថ្ងៃ ($)</span><br>
                            <input type="number" step="0.5" id="rate-${id}" value="${p.rate}" 
                                   style="width:70px; text-align:center; font-weight:bold; border:1px solid #ddd; border-radius:5px;"
                                   onchange="updateRate('${id}', this.value)">
                        </div>
                    </div>
                    <table>
                        <thead><tr><th>ថ្ងៃទី</th><th>វត្តមាន(ថ្ងៃ)</th><th>OT(ម៉ោង)</th><th>ខ្ចីលុយ ($)</th></tr></thead>
                        <tbody>`;
                
                for (let d = start; d <= end; d++) {
                    const isToday = (d === curDay && selMonth === curMonth && selYear === curYear);
                    const dayData = personalData[d] || { att: '', ot: '', loan: '' };
                    html += `<tr class="${isToday ? 'current-day-row' : ''}">
                        <td class="row-day">${d}</td>
                        <td><input type="number" step="0.5" class="cell-input att" data-id="${id}" value="${dayData.att}" oninput="handleInput()"></td>
                        <td><input type="number" step="0.5" class="cell-input ot" data-id="${id}" value="${dayData.ot}" oninput="handleInput()"></td>
                        <td><input type="number" step="1" class="cell-input loan" data-id="${id}" value="${dayData.loan}" oninput="handleInput()"></td>
                    </tr>`;
                }
                
                html += `</tbody></table>
                    <div class="card-footer">
                        <div style="display:flex; gap:30px;">
                            <div><span style="display:block; font-size:12px; color:#64748b">សរុបវត្តមាន</span><span style="font-size:18px; font-weight:800; color:var(--success)"><span id="total-days-${id}">0</span> ថ្ងៃ</span></div>
                            <div><span style="display:block; font-size:12px; color:#64748b">សរុបខ្ចីលុយ</span><span style="font-size:18px; font-weight:800; color:var(--danger)">-$<span id="total-loan-${id}">0.00</span></span></div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:13px; font-weight:700; color:var(--primary)">ប្រាក់ខែត្រូវបើកសរុប</div>
                            <div class="total-amount">$<span id="usd-${id}">0.00</span></div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("payrollContent").innerHTML = html;
            calculate();
        }

        function handleInput() {
            calculate();
            clearTimeout(autoSaveTimer);
            document.getElementById("statusLabel").innerText = "ស្ថានភាព: កំពុងវាយ...";
            autoSaveTimer = setTimeout(() => saveAll(false), 2000);
        }

        function calculate() {
            Object.keys(staffList).forEach((id) => {
                let days = 0, loan = 0, rate = parseFloat(document.getElementById(`rate-${id}`).value) || 0;
                const card = document.querySelector(`.staff-card[data-id="${id}"]`);
                if (!card) return;
                
                card.querySelectorAll('.att').forEach(el => days += parseFloat(el.value) || 0);
                card.querySelectorAll('.loan').forEach(el => loan += parseFloat(el.value) || 0);
                
                document.getElementById(`total-days-${id}`).innerText = days;
                document.getElementById(`total-loan-${id}`).innerText = loan.toFixed(2);
                document.getElementById(`usd-${id}`).innerText = (days * rate - loan).toLocaleString(undefined, {minimumFractionDigits: 2});
            });
        }

        function saveAll(manual = false) {
            const m = document.getElementById("selectMonth").value;
            const y = document.getElementById("selectYear").value;
            const key = `payroll_id_system/${y}/${m}/P${currentPeriod}`;
            const allData = {};

            document.querySelectorAll(".staff-card").forEach(card => {
                const id = card.getAttribute("data-id");
                allData[id] = {};
                card.querySelectorAll('tbody tr').forEach(row => {
                    const day = row.querySelector('.row-day').innerText;
                    const att = row.querySelector('.att').value;
                    const ot = row.querySelector('.ot').value;
                    const loan = row.querySelector('.loan').value;
                    if (att || ot || loan) {
                        allData[id][day] = { att, ot, loan };
                    }
                });
            });

            db.ref(key).set(allData).then(() => {
                document.getElementById("statusLabel").innerText = "ស្ថានភាព: រក្សាទុកស្វ័យប្រវត្តិរួចរាល់ (" + new Date().toLocaleTimeString() + ")";
                if (manual) alert("រក្សាទុកជោគជ័យ! ✅");
            });
        }

        function updateRate(id, val) {
            staffList[id].rate = parseFloat(val) || 0;
            db.ref("global_staff_object").set(staffList);
            calculate();
            saveAll(false);
        }

        function addNewStaff() {
            let name = prompt("ឈ្មោះជាងថ្មី:");
            if (name) {
                let rate = prompt("តម្លៃ/ថ្ងៃ ($):", "15");
                const id = 'ID' + Date.now();
                staffList[id] = { name: name, rate: parseFloat(rate) || 0 };
                db.ref("global_staff_object").set(staffList).then(() => loadValues());
            }
        }

        function deleteStaff(id) {
            if (confirm("លុប " + staffList[id].name + "?")) {
                delete staffList[id];
                db.ref("global_staff_object").set(staffList).then(() => loadValues());
            }
        }
    </script>
</body>
</html>
